<!DOCTYPE html>
<html>

<head>
    <title>CloudVault</title>
</head>

<body>
    <h2>🚀 CloudVault (Private Mode)</h2>

    <!-- USERNAME -->
    <input type="text" id="user" placeholder="Enter username" />
    <button onclick="loadFiles()">Load My Files</button>

    <br><br>

    <!-- UPLOAD -->
    <input type="file" id="fileInput" />
    <button onclick="uploadFile()">Upload</button>

    <h3>Your Files</h3>
    <button onclick="loadFiles()">Refresh</button>

    <ul id="fileList"></ul>

    <script>
        function getUser() {
            return document.getElementById("user").value || "guest";
        }

        async function uploadFile() {
            const fileInput = document.getElementById("fileInput");
            const file = fileInput.files[0];
            if (!file) return alert("Select a file");

            const formData = new FormData();
            formData.append("file", file);

            await fetch(`/upload?user=${getUser()}`, {
                method: "POST",
                body: formData
            });

            fileInput.value = "";
            loadFiles();
        }

        async function loadFiles() {
            const user = getUser();

            const res = await fetch(`/files?user=${user}`);
            const files = await res.json();

            const list = document.getElementById("fileList");
            list.innerHTML = "";

            files.forEach(file => {
                const li = document.createElement("li");

                const link = document.createElement("a");
                link.href = `/uploads/${user}/${file}`;
                link.textContent = file;
                link.target = "_blank";

                const btn = document.createElement("button");
                btn.textContent = "Delete";

                btn.onclick = async () => {
                    await fetch(`/delete/${file}?user=${user}`, {
                        method: "DELETE"
                    });
                    loadFiles();
                };

                li.appendChild(link);
                li.appendChild(btn);
                list.appendChild(li);
            });
        }
    </script>
</body>

</html>
